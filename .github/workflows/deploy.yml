name: Deploy to Cafe24

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        run: |
          set -euo pipefail

          : "${SERVER_SSH_KEY:?SERVER_SSH_KEY secret is required}"

          SERVER_HOST=$(printf '%s' "${SERVER_HOST:-daeseaca.cafe24.com}" | tr -d '\r\n')
          SERVER_USER=$(printf '%s' "${SERVER_USER:-root}" | tr -d '\r\n')
          SERVER_PORT=$(printf '%s' "${SERVER_PORT:-22}" | tr -d '\r\n')
          SERVER_APP_DIR=$(printf '%s' "${SERVER_APP_DIR:-/opt/daese_academy_app}" | tr -d '\r\n')

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

          REMOTE_DIR=$(printf '%q' "$SERVER_APP_DIR")
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "cd $REMOTE_DIR && git pull --ff-only && docker compose up -d --build && docker image prune -f >/dev/null 2>&1 || true"

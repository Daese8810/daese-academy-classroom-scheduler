services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-daese_scheduler}
      POSTGRES_USER: ${POSTGRES_USER:-daese}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daese} -d ${POSTGRES_DB:-daese_scheduler}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:3001}
      DATABASE_URL: ${DATABASE_URL:-postgresql://daese:change-this-password@db:5432/daese_scheduler}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-daese_session}
      SESSION_DAYS: ${SESSION_DAYS:-14}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://daeseaca.cafe24.com}
      KAKAOWORK_APP_KEY: ${KAKAOWORK_APP_KEY:-}
      KAKAOWORK_KOREAN_ROOM_MANAGER_EMAIL: ${KAKAOWORK_KOREAN_ROOM_MANAGER_EMAIL:-sasin0815@naver.com}
      KAKAOWORK_CLASSROOM_NOTICE_CONVERSATION_ID: ${KAKAOWORK_CLASSROOM_NOTICE_CONVERSATION_ID:-}
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대세학원 강의실 예약</title>
  <style>
    :root {
      --bg: #eaf2ff;
      --panel: #ffffff;
      --panel-soft: #eef5ff;
      --line: #bfd3f4;
      --line-strong: #8fb4ee;
      --text: #1f2937;
      --muted: #667085;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --green-bg: #d8f7e7;
      --green-bd: #1fa971;
      --amber-bg: #fff1c9;
      --amber-bd: #e1a40d;
      --red-bg: #ffe0e0;
      --red-bd: #dc4b4b;
      --gray-bg: #eef2f7;
      --gray-bd: #97a3b6;
      --purple-bg: #ece8ff;
      --purple-bd: #7354e8;
      --shadow: 0 16px 34px rgba(37, 99, 235, 0.11);
      --radius: 18px;
      --radius-sm: 12px;
      --header-h: 72px;
      --sticky-top: 0px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.14) 0%, transparent 32%),
        linear-gradient(180deg, #eaf2ff 0%, #f6f9ff 42%, #edf4ff 100%);
      color: var(--text);
      min-height: 100vh;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #edf4ff 100%);
      color: #1749be;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      transition: 0.16s ease;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.08);
    }

    button:hover {
      border-color: var(--line-strong);
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.13);
    }

    button.primary {
  background: linear-gradient(135deg, #e96412, #f37520);
  color: white;
  border-color: #f37520;
  font-weight: 700;
}

button.primary:hover {
  border-color: #d95c10;
  background: linear-gradient(135deg, #d95c10, #e96d1a);
}

    button.ghost {
      background: #f0f6ff;
      color: #1749be;
      border-color: #b9cff5;
    }

    button.warn {
      background: #fff7f7;
      border-color: #f3c4c4;
      color: #b42318;
    }

    button.success {
      background: #effcf4;
      border-color: #b8e8cc;
      color: #0f7a4f;
    }

    button.icon-button {
      width: 40px;
      height: 40px;
      min-height: 40px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #eef5ff 100%);
      border-color: #b9cff5;
    }

    button.icon-button svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: #1d4ed8;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hidden { display: none !important; }

    .screen {
      min-height: 100vh;
    }

    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .login-card {
      width: min(980px, 100%);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      border-radius: 28px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.15fr 0.95fr;
    }

    .login-left {
      padding: 38px;
      background: linear-gradient(145deg, rgba(37,99,235,0.98), rgba(30,64,175,0.96));
      color: white;
    }

    .login-left h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.2;
    }

    .login-left p {
      margin: 0 0 22px;
      line-height: 1.7;
      color: rgba(255,255,255,0.9);
    }

    .login-stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .login-stat {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 16px;
    }

    .login-stat strong {
      display: block;
      font-size: 24px;
      margin-bottom: 6px;
    }

    .account-list {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 18px;
    }

    .account-chip {
      border-radius: 16px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 12px 14px;
      line-height: 1.35;
      cursor: pointer;
    }

    .account-chip small {
      display: block;
      color: rgba(255,255,255,0.78);
      margin-top: 3px;
    }

    .login-right {
      padding: 38px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
    }

    .login-right h2 {
      margin: 0;
      font-size: 28px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-weight: 700;
      font-size: 14px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: white;
      padding: 12px 14px;
      color: var(--text);
    }

    .field textarea {
      min-height: 96px;
      resize: vertical;
    }

    .help {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .login-foot {
      padding-top: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .app-shell {
      max-width: none;
      width: 100%;
      margin: 0 auto;
      padding: 10px 10px 16px;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(135deg, rgba(29,78,216,0.98), rgba(37,99,235,0.94));
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.24);
      margin: -10px -10px 0;
      padding: 10px 12px;
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.2);
    }

    .app-header-inner {
      max-width: none;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      object-fit: contain;
      padding: 7px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }

    .brand-copy {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 23px;
      color: white;
    }

    .brand p {
      margin: 4px 0 0;
      color: rgba(255,255,255,0.84);
      font-size: 13px;
      font-weight: 700;
    }

    .user-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      height: 40px;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.92);
      color: #1749be;
      white-space: nowrap;
      font-weight: 800;
    }

    .badge.admin {
      color: #7c2d12;
      background: #fff7ed;
      border-color: #fdba74;
      font-weight: 700;
    }

    .quick-panel-dropdown {
      position: relative;
      display: inline-block;
    }

    .quick-panel-dropdown summary {
      list-style: none;
    }

    .quick-panel-dropdown summary::-webkit-details-marker {
      display: none;
    }

    .quick-panel-summary {
      width: auto;
      min-width: 96px;
      height: 40px;
      min-height: 40px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
      border: 1px solid #b9cff5;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #eef5ff 100%);
      color: #1d4ed8;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.10);
      cursor: pointer;
      transition: 0.16s ease;
    }

    .quick-panel-summary:hover {
      border-color: #2563eb;
      background: #eaf2ff;
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.16);
    }

    .quick-panel-dropdown[open] .quick-panel-summary {
      color: white;
      background: #2563eb;
      border-color: #2563eb;
    }

    .summary-chevron {
      font-size: 11px;
      line-height: 1;
    }

    .quick-panel-dropdown-panel {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      z-index: 80;
      width: min(720px, calc(100vw - 36px));
      max-height: min(640px, calc(100vh - 112px));
      overflow: auto;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.98);
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.18);
    }

    .quick-panel-dropdown-panel-narrow {
      width: min(380px, calc(100vw - 36px));
    }

    .quick-panel-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .quick-panel-section {
      min-width: 0;
      display: grid;
      gap: 12px;
    }

    .quick-panel-section h3 {
      margin: 0;
      font-size: 17px;
    }

    .quick-panel-section p.sub {
      margin: -6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .layout-gap { height: 8px; }

    .card {
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(216,226,240,0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .toolbar-card {
      padding: 10px 12px;
      display: grid;
      gap: 8px;
      background: linear-gradient(135deg, #ffffff 0%, #eff6ff 100%);
      border-color: #b9cff5;
      border-radius: 14px;
    }

    .toolbar-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-row .group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar-controls-row {
      justify-content: flex-start;
      align-items: flex-start;
    }

    .toolbar-inline-controls {
      flex: 1 1 600px;
      min-width: 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
    }

    .toolbar-row select,
    .toolbar-row input[type="date"] {
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 8px 11px;
      background: #ffffff;
      min-height: 38px;
      color: #0f2a55;
      font-weight: 700;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      border-radius: 999px;
      padding: 8px 13px;
      border: 1px solid #cfe0ff;
      background: linear-gradient(180deg, #ffffff 0%, #edf4ff 100%);
      color: #1749be;
      cursor: pointer;
      font-weight: 800;
      font-size: 13px;
      box-shadow: 0 7px 14px rgba(37, 99, 235, 0.08);
    }

    .chip.active {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: white;
      border-color: transparent;
    }

    .toggle-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fbff;
      font-size: 13px;
      color: #1749be;
      font-weight: 800;
    }

    .repeat-toggle {
      width: fit-content;
      min-height: 34px;
      padding: 5px 10px;
      line-height: 1;
      white-space: nowrap;
    }

    .toggle-pill input { accent-color: var(--primary); }

    .summary-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      order: 30;
      margin-top: 14px;
    }

    .summary-card {
      padding: 18px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, #ffffff 0%, #eef6ff 100%);
      border-color: #b9cff5;
    }

    .summary-card h3 {
      margin: 0 0 6px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .summary-card strong {
      display: block;
      font-size: 28px;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .summary-card p {
      margin: 0;
      line-height: 1.6;
      font-size: 14px;
      color: #344054;
    }

    .summary-card::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      right: -30px;
      bottom: -40px;
      background: radial-gradient(circle, rgba(37,99,235,0.08), transparent 68%);
      border-radius: 50%;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      order: 20;
      min-width: 0;
    }

    .board-card {
      overflow: hidden;
      min-width: 0;
    }

    .board-head {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .board-head h2 {
      margin: 0;
      font-size: 19px;
    }

    .board-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .board-wrap {
      overflow: auto;
      max-height: calc(100vh - 238px);
      background: linear-gradient(180deg, #fbfdff 0%, #ffffff 12%);
      max-width: 100%;
    }

    .week-date-jump-row {
      position: sticky;
      left: 0;
      z-index: 8;
      display: flex;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #eef6ff 100%);
      min-width: max-content;
    }

    .week-date-button {
      min-width: 110px;
      min-height: 34px;
      padding: 7px 11px;
      border-radius: 999px;
      border-color: #b9cff5;
      background: #ffffff;
      color: #1749be;
      font-weight: 900;
    }

    .week-date-button.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
    }

    .schedule-table {
      width: max-content;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    .schedule-table thead th {
  position: sticky;
  top: 0;
  z-index: 4;
  background: linear-gradient(180deg, #dbeafe 0%, #eff6ff 100%);
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
      font-size: 12px;
      color: #123b8a;
      text-align: center;
      padding: 10px 5px;
      min-width: 52px;
      white-space: nowrap;
    }

.schedule-table thead th.day-group {
  font-size: 13px;
  font-weight: 800;
  background: linear-gradient(180deg, #bfdbfe 0%, #dbeafe 100%);
  color: #1d4ed8;
  border-bottom: 1px solid #d0def8;
}

/* 주간 보기: 날짜줄 + 시간줄을 각각 sticky 처리 */
.week-table thead tr:first-child th {
  position: sticky;
  top: 0;
  z-index: 6;
}

.week-table thead tr:nth-child(2) th {
  position: sticky;
  top: 46px;
  z-index: 5;
}

/* 좌측 상단 '강의실' 칸 */
.week-table thead th.first-col {
  position: sticky;
  left: 0;
  top: 0;
  z-index: 7;
}

/* 날짜줄의 왼쪽 첫 칸과 시간줄이 자연스럽게 보이도록 배경 유지 */
.week-table thead tr:first-child th,
.week-table thead tr:nth-child(2) th {
  background: linear-gradient(180deg, #dbeafe 0%, #eff6ff 100%);
}

.week-table thead tr:first-child th.day-group {
  background: linear-gradient(180deg, #bfdbfe 0%, #dbeafe 100%);
}

.week-table thead th.week-day-even {
  background: linear-gradient(180deg, #dbeafe 0%, #eff6ff 100%);
}

.week-table thead th.week-day-odd {
  background: linear-gradient(180deg, #e0f2fe 0%, #f0f9ff 100%);
}

.week-table thead tr:first-child th.day-group.week-day-even {
  background: linear-gradient(180deg, #bfdbfe 0%, #dbeafe 100%);
}

.week-table thead tr:first-child th.day-group.week-day-odd {
  background: linear-gradient(180deg, #bae6fd 0%, #e0f2fe 100%);
}

.week-table .week-day-break {
  border-left: 4px solid #2563eb !important;
}

.week-table tbody td.week-day-even {
  background: #ffffff;
}

.week-table tbody td.week-day-odd {
  background: #f8fbff;
}

    .schedule-table thead th.first-col,
    .schedule-table tbody th {
      position: sticky;
      left: 0;
      z-index: 5;
      min-width: 132px;
      max-width: 132px;
      width: 132px;
      text-align: left;
      background: linear-gradient(180deg, #ffffff, #fbfdff);
      padding: 12px 14px;
      border-right: 1px solid var(--line);
    }

    .schedule-table tbody th {
      font-size: 14px;
      line-height: 1.4;
      border-bottom: 1px solid var(--line);
      z-index: 3;
    }

    .room-sub {
      display: none;
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 500;
    }

    .schedule-table td {
      height: 62px;
      min-width: 52px;
      border-right: 1px solid #eaf0f8;
      border-bottom: 1px solid #e8eef6;
      padding: 4px;
      vertical-align: top;
      background: white;
    }

    .schedule-table td.empty-slot {
      cursor: pointer;
      transition: 0.14s ease;
      background-image: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(250,252,255,0.9));
    }

    .schedule-table td.empty-slot:hover {
      background: #eef6ff;
    }

    .schedule-table td.now-marker {
      box-shadow: inset 0 3px 0 var(--primary);
    }

    .schedule-table td.past-slot {
      background: #fafcff;
      opacity: 0.55;
    }

    .res-box {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      padding: 8px;
      border: 1px solid transparent;
      font-size: 12px;
      line-height: 1.35;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 4px;
      position: relative;
    }

    .res-box strong {
      display: block;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .res-box small {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: rgba(17,24,39,0.78);
    }

    .res-usage {
      background: var(--green-bg);
      border-color: rgba(31,169,113,0.42);
      box-shadow: inset 0 0 0 1px rgba(31,169,113,0.12);
    }

    .res-event {
      background: var(--amber-bg);
      border-color: rgba(225,164,13,0.42);
      box-shadow: inset 0 0 0 1px rgba(225,164,13,0.12);
    }

    .res-blocked {
      background: var(--red-bg);
      border-color: rgba(220,75,75,0.42);
      box-shadow: inset 0 0 0 1px rgba(220,75,75,0.12);
    }

    .res-filtered {
      background: var(--gray-bg);
      border-color: rgba(151,163,182,0.4);
      color: #475467;
    }

    .res-filtered small,
    .res-filtered strong {
      color: inherit;
    }

    .res-own {
      box-shadow: inset 0 0 0 1px rgba(115,84,232,0.18), 0 0 0 1px rgba(115,84,232,0.08);
      outline: 2px solid rgba(115,84,232,0.22);
    }

    .tiny-tag {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(255,255,255,0.55);
    }

    .side-stack {
      display: grid;
      gap: 16px;
      position: sticky;
      top: 84px;
    }

    .side-card {
      padding: 18px;
    }

    .side-card h3 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .side-card p.sub {
      margin: -6px 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .list-item {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff, #fbfdff);
    }

    .list-item[data-action] {
      cursor: pointer;
      transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
    }

    .list-item[data-action]:hover {
      transform: translateY(-2px);
      border-color: #8fb4ee;
      background: linear-gradient(180deg, #f8fbff, #eff6ff);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.14);
    }

    .list-item[data-action]:active {
      transform: translateY(0);
      box-shadow: 0 5px 12px rgba(37, 99, 235, 0.12);
    }

    .list-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .list-item small {
      color: var(--muted);
      line-height: 1.5;
    }

    .mobile-board {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .mobile-day-tabs {
      display: flex;
      gap: 8px;
      overflow: auto;
      padding-bottom: 4px;
    }

    .mobile-tab {
      white-space: nowrap;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .mobile-tab.active {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      border-color: transparent;
      color: white;
    }

    .room-mobile-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
      padding: 14px;
      display: grid;
      gap: 12px;
      box-shadow: 0 8px 16px rgba(15,23,42,0.04);
    }

    .room-mobile-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .room-mobile-head h4 {
      margin: 0;
      font-size: 16px;
    }

    .status-pill {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--line);
      background: #f8fbff;
      white-space: nowrap;
    }

    .status-pill.free {
      background: #eefcf3;
      border-color: #bde8c9;
      color: #0f7a4f;
    }

    .status-pill.busy {
      background: #fff4f4;
      border-color: #f0c1c1;
      color: #b42318;
    }

    .mobile-res-list {
      display: grid;
      gap: 10px;
    }

    .mobile-res-item {
      border-radius: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      background: #fcfdff;
      cursor: pointer;
    }

    .mobile-res-item.usage { border-left: 6px solid var(--green-bd); }
    .mobile-res-item.event { border-left: 6px solid var(--amber-bd); }
    .mobile-res-item.blocked { border-left: 6px solid var(--red-bd); }
    .mobile-res-item.filtered { border-left: 6px solid var(--gray-bd); }

    .empty-state {
      border: 1px dashed var(--line-strong);
      border-radius: 16px;
      background: #fbfdff;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.48);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(760px, 100%);
      max-height: calc(100vh - 40px);
      overflow: auto;
      background: #ffffff;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 24px 64px rgba(15,23,42,0.24);
      padding: 24px;
      position: relative;
    }

    .modal h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .modal p.sub {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .modal-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .modal-grid .full { grid-column: 1 / -1; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .detail-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin: 18px 0;
    }

    .detail-grid .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fbfdff;
    }

    .detail-grid .item strong {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .inline-note {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--line);
      background: #f8fbff;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .toast-wrap {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 140;
      display: grid;
      gap: 10px;
      width: min(360px, calc(100vw - 40px));
    }

    .toast {
      border-radius: 16px;
      background: rgba(17,24,39,0.94);
      color: white;
      padding: 14px 16px;
      box-shadow: 0 16px 32px rgba(15,23,42,0.2);
      line-height: 1.55;
      font-size: 14px;
      animation: slideIn 0.2s ease;
    }

    .toast.error { background: rgba(180,35,24,0.94); }
    .toast.success { background: rgba(15,122,79,0.94); }

    @keyframes slideIn {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 1280px) {
      .toolbar-inline-controls {
        flex-basis: 100%;
        justify-content: flex-start;
      }
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .main-grid { grid-template-columns: 1fr; }
      .side-stack { position: static; }
      .board-wrap { max-height: calc(100vh - 238px); }
    }

    @media (max-width: 980px) {
      .login-card { grid-template-columns: 1fr; }
      .login-left, .login-right { padding: 28px; }
      .account-list { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: 1fr; }
      .app-header-inner { align-items: flex-start; }
      .quick-panel-grid { grid-template-columns: 1fr; }
      .modal-grid, .detail-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .app-header { position: static; margin: -10px -10px 0; }
      .app-shell { padding: 10px; }
      .toolbar-card { padding: 10px; }
      .brand h1 { font-size: 21px; }
      .brand-mark {
        width: 44px;
        height: 44px;
        flex-basis: 44px;
        padding: 7px;
      }
      .user-toolbar { justify-content: flex-start; }
      .schedule-table thead th.first-col,
      .schedule-table tbody th { min-width: 122px; width: 122px; max-width: 122px; }
    }

<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대세학원 강의실 공유 예약 보드</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --line: #d8e2f0;
      --line-strong: #c7d4e6;
      --text: #1f2937;
      --muted: #667085;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --green-bg: #d8f7e7;
      --green-bd: #1fa971;
      --amber-bg: #fff1c9;
      --amber-bd: #e1a40d;
      --red-bg: #ffe0e0;
      --red-bd: #dc4b4b;
      --gray-bg: #eef2f7;
      --gray-bd: #97a3b6;
      --purple-bg: #ece8ff;
      --purple-bd: #7354e8;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      --radius: 18px;
      --radius-sm: 12px;
      --header-h: 72px;
      --sticky-top: 0px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at top left, #eff6ff 0%, #f4f7fb 44%, #edf3fb 100%);
      color: var(--text);
      min-height: 100vh;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      transition: 0.16s ease;
    }

    button:hover {
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    button.primary {
  background: linear-gradient(135deg, #e96412, #f37520);
  color: white;
  border-color: #f37520;
  font-weight: 700;
}

button.primary:hover {
  border-color: #d95c10;
  background: linear-gradient(135deg, #d95c10, #e96d1a);
}

    button.ghost {
      background: var(--panel-soft);
    }

    button.warn {
      background: #fff7f7;
      border-color: #f3c4c4;
      color: #b42318;
    }

    button.success {
      background: #effcf4;
      border-color: #b8e8cc;
      color: #0f7a4f;
    }

    .hidden { display: none !important; }

    .screen {
      min-height: 100vh;
    }

    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .login-card {
      width: min(980px, 100%);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      border-radius: 28px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.15fr 0.95fr;
    }

    .login-left {
      padding: 38px;
      background: linear-gradient(145deg, rgba(37,99,235,0.98), rgba(30,64,175,0.96));
      color: white;
    }

    .login-left h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.2;
    }

    .login-left p {
      margin: 0 0 22px;
      line-height: 1.7;
      color: rgba(255,255,255,0.9);
    }

    .login-stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .login-stat {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 16px;
    }

    .login-stat strong {
      display: block;
      font-size: 24px;
      margin-bottom: 6px;
    }

    .account-list {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 18px;
    }

    .account-chip {
      border-radius: 16px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 12px 14px;
      line-height: 1.35;
      cursor: pointer;
    }

    .account-chip small {
      display: block;
      color: rgba(255,255,255,0.78);
      margin-top: 3px;
    }

    .login-right {
      padding: 38px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
    }

    .login-right h2 {
      margin: 0;
      font-size: 28px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-weight: 700;
      font-size: 14px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: white;
      padding: 12px 14px;
      color: var(--text);
    }

    .field textarea {
      min-height: 96px;
      resize: vertical;
    }

    .help {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .login-foot {
      padding-top: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .app-shell {
      max-width: 1780px;
      margin: 0 auto;
      padding: 18px 18px 28px;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244,247,251,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(216,226,240,0.7);
      margin: -18px -18px 0;
      padding: 14px 18px;
    }

    .app-header-inner {
      max-width: 1780px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .user-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      border: 1px solid var(--line);
      background: white;
      white-space: nowrap;
    }

    .badge.admin {
      color: #7c2d12;
      background: #fff7ed;
      border-color: #fdba74;
      font-weight: 700;
    }

    .layout-gap { height: 14px; }

    .card {
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(216,226,240,0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .toolbar-card {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .toolbar-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-row .group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar-row select,
    .toolbar-row input[type="date"] {
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      background: white;
      min-height: 42px;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      border-radius: 999px;
      padding: 9px 14px;
      border: 1px solid #cfe0ff;
      background: #edf4ff;
      color: #1749be;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }

    .chip.active {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: white;
      border-color: transparent;
    }

    .toggle-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      font-size: 13px;
    }

    .toggle-pill input { accent-color: var(--primary); }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--muted);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.08);
      display: inline-block;
    }

    .summary-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .summary-card {
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .summary-card h3 {
      margin: 0 0 6px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .summary-card strong {
      display: block;
      font-size: 28px;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .summary-card p {
      margin: 0;
      line-height: 1.6;
      font-size: 14px;
      color: #344054;
    }

    .summary-card::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      right: -30px;
      bottom: -40px;
      background: radial-gradient(circle, rgba(37,99,235,0.08), transparent 68%);
      border-radius: 50%;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(320px, 0.85fr);
      gap: 16px;
      align-items: start;
    }

    .board-card {
      overflow: hidden;
    }

    .board-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .board-head h2 {
      margin: 0;
      font-size: 20px;
    }

    .board-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .board-wrap {
      overflow: auto;
      max-height: calc(100vh - 320px);
      background: linear-gradient(180deg, #fbfdff 0%, #ffffff 12%);
    }

    .schedule-table {
      width: max-content;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    .schedule-table thead th {
      position: sticky;
      top: 0;
      z-index: 4;
      background: #f7faff;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      font-size: 12px;
      color: #334155;
      text-align: center;
      padding: 11px 6px;
      min-width: 72px;
      white-space: nowrap;
    }

    .schedule-table thead th.day-group {
      font-size: 13px;
      font-weight: 800;
      background: #eef4ff;
      color: #1d4ed8;
      border-bottom: 1px solid #d0def8;
    }

    .schedule-table thead th.first-col,
    .schedule-table tbody th {
      position: sticky;
      left: 0;
      z-index: 5;
      min-width: 174px;
      max-width: 174px;
      width: 174px;
      text-align: left;
      background: linear-gradient(180deg, #ffffff, #fbfdff);
      padding: 12px 14px;
      border-right: 1px solid var(--line);
    }

    .schedule-table tbody th {
      font-size: 14px;
      line-height: 1.4;
      border-bottom: 1px solid var(--line);
      z-index: 3;
    }

    .room-sub {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 500;
    }

    .schedule-table td {
      height: 64px;
      min-width: 72px;
      border-right: 1px solid #eaf0f8;
      border-bottom: 1px solid #e8eef6;
      padding: 4px;
      vertical-align: top;
      background: white;
    }

    .schedule-table td.empty-slot {
      cursor: pointer;
      transition: 0.14s ease;
      background-image: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(250,252,255,0.9));
    }

    .schedule-table td.empty-slot:hover {
      background: #eef6ff;
    }

    .schedule-table td.now-marker {
      box-shadow: inset 0 3px 0 var(--primary);
    }

    .schedule-table td.past-slot {
      background: #fafcff;
      opacity: 0.55;
    }

    .res-box {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      padding: 8px;
      border: 1px solid transparent;
      font-size: 12px;
      line-height: 1.35;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 4px;
      position: relative;
    }

    .res-box strong {
      display: block;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .res-box small {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: rgba(17,24,39,0.78);
    }

    .res-usage {
      background: var(--green-bg);
      border-color: rgba(31,169,113,0.42);
      box-shadow: inset 0 0 0 1px rgba(31,169,113,0.12);
    }

    .res-event {
      background: var(--amber-bg);
      border-color: rgba(225,164,13,0.42);
      box-shadow: inset 0 0 0 1px rgba(225,164,13,0.12);
    }

    .res-blocked {
      background: var(--red-bg);
      border-color: rgba(220,75,75,0.42);
      box-shadow: inset 0 0 0 1px rgba(220,75,75,0.12);
    }

    .res-filtered {
      background: var(--gray-bg);
      border-color: rgba(151,163,182,0.4);
      color: #475467;
    }

    .res-filtered small,
    .res-filtered strong {
      color: inherit;
    }

    .res-own {
      box-shadow: inset 0 0 0 1px rgba(115,84,232,0.18), 0 0 0 1px rgba(115,84,232,0.08);
      outline: 2px solid rgba(115,84,232,0.22);
    }

    .tiny-tag {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(255,255,255,0.55);
    }

    .side-stack {
      display: grid;
      gap: 16px;
      position: sticky;
      top: 84px;
    }

    .side-card {
      padding: 18px;
    }

    .side-card h3 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .side-card p.sub {
      margin: -6px 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .list-item {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff, #fbfdff);
    }

    .list-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .list-item small {
      color: var(--muted);
      line-height: 1.5;
    }

    .mobile-board {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .mobile-day-tabs {
      display: flex;
      gap: 8px;
      overflow: auto;
      padding-bottom: 4px;
    }

    .mobile-tab {
      white-space: nowrap;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .mobile-tab.active {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      border-color: transparent;
      color: white;
    }

    .room-mobile-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
      padding: 14px;
      display: grid;
      gap: 12px;
      box-shadow: 0 8px 16px rgba(15,23,42,0.04);
    }

    .room-mobile-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .room-mobile-head h4 {
      margin: 0;
      font-size: 16px;
    }

    .status-pill {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--line);
      background: #f8fbff;
      white-space: nowrap;
    }

    .status-pill.free {
      background: #eefcf3;
      border-color: #bde8c9;
      color: #0f7a4f;
    }

    .status-pill.busy {
      background: #fff4f4;
      border-color: #f0c1c1;
      color: #b42318;
    }

    .mobile-res-list {
      display: grid;
      gap: 10px;
    }

    .mobile-res-item {
      border-radius: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      background: #fcfdff;
      cursor: pointer;
    }

    .mobile-res-item.usage { border-left: 6px solid var(--green-bd); }
    .mobile-res-item.event { border-left: 6px solid var(--amber-bd); }
    .mobile-res-item.blocked { border-left: 6px solid var(--red-bd); }
    .mobile-res-item.filtered { border-left: 6px solid var(--gray-bd); }

    .empty-state {
      border: 1px dashed var(--line-strong);
      border-radius: 16px;
      background: #fbfdff;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.48);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(760px, 100%);
      max-height: calc(100vh - 40px);
      overflow: auto;
      background: #ffffff;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 24px 64px rgba(15,23,42,0.24);
      padding: 24px;
      position: relative;
    }

    .modal h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .modal p.sub {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .modal-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .modal-grid .full { grid-column: 1 / -1; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .detail-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin: 18px 0;
    }

    .detail-grid .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fbfdff;
    }

    .detail-grid .item strong {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .inline-note {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--line);
      background: #f8fbff;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .toast-wrap {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 140;
      display: grid;
      gap: 10px;
      width: min(360px, calc(100vw - 40px));
    }

    .toast {
      border-radius: 16px;
      background: rgba(17,24,39,0.94);
      color: white;
      padding: 14px 16px;
      box-shadow: 0 16px 32px rgba(15,23,42,0.2);
      line-height: 1.55;
      font-size: 14px;
      animation: slideIn 0.2s ease;
    }

    .toast.error { background: rgba(180,35,24,0.94); }
    .toast.success { background: rgba(15,122,79,0.94); }

    @keyframes slideIn {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 1280px) {
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .main-grid { grid-template-columns: 1fr; }
      .side-stack { position: static; }
      .board-wrap { max-height: none; }
    }

    @media (max-width: 980px) {
      .login-card { grid-template-columns: 1fr; }
      .login-left, .login-right { padding: 28px; }
      .account-list { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: 1fr; }
      .app-header-inner { align-items: flex-start; }
      .modal-grid, .detail-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .app-header { position: static; margin: -18px -18px 0; }
      .app-shell { padding: 14px; }
      .toolbar-card { padding: 14px; }
      .brand h1 { font-size: 21px; }
      .user-toolbar { justify-content: flex-start; }
      .schedule-table thead th.first-col,
      .schedule-table tbody th { min-width: 140px; width: 140px; max-width: 140px; }
    }
.brand-hero {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f37520;
  padding: 38px;
}
    
.brand-hero-inner {
  width: 100%;
